# Kubernetes Deployment for Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: umbrella-frontend
  namespace: umbrella
spec:
  replicas: 3
  selector:
    matchLabels:
      app: umbrella-frontend
  template:
    metadata:
      labels:
        app: umbrella-frontend
    spec:
      containers:
      - name: umbrella-frontend
        image: umbrella/frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://umbrella-api-service/api"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: umbrella-frontend-service
  namespace: umbrella
spec:
  selector:
    app: umbrella-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer
