# Redis Deployment for Kubernetes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: umbrella-redis
  namespace: umbrella
spec:
  replicas: 1
  selector:
    matchLabels:
      app: umbrella-redis
  template:
    metadata:
      labels:
        app: umbrella-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 250m
            memory: 512Mi
      volumes:
      - name: redis-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: umbrella-redis
  namespace: umbrella
spec:
  selector:
    app: umbrella-redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
